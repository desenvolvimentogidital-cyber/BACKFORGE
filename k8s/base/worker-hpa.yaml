apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backforge-worker
  labels:
    app.kubernetes.io/name: backforge-worker
    app.kubernetes.io/part-of: backforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backforge-worker
  minReplicas: 1
  maxReplicas: 5
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      selectPolicy: Min
      policies:
        - type: Percent
          value: 20
          periodSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
