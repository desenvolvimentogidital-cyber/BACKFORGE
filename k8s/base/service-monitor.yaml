apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backforge-api
  labels:
    app.kubernetes.io/name: backforge-api
    app.kubernetes.io/part-of: backforge
    release: kube-prometheus-stack
spec:
  namespaceSelector:
    matchNames:
      - backforge
  selector:
    matchLabels:
      monitoring.backforge.io/scrape: "true"
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true
