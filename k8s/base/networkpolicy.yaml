apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backforge-api-ingress
  labels:
    app.kubernetes.io/name: backforge-api
    app.kubernetes.io/part-of: backforge
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: backforge-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 3000
