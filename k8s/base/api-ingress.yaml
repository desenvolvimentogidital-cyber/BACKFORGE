apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backforge-api
  labels:
    app.kubernetes.io/name: backforge-api
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: backforge
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.backforge.example.com
      secretName: backforge-api-tls
  rules:
    - host: api.backforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backforge-api
                port:
                  number: 80
