name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint and production build
        env:
          VITE_FEATURE_FLAGS: ${{ vars.VITE_FEATURE_FLAGS }}
        run: |
          export VITE_FEATURE_FLAGS="${VITE_FEATURE_FLAGS:-{\"newDashboard\":true,\"launchLandingPage\":true,\"docsCallout\":true}}"
          npm run lint
          npm run build
