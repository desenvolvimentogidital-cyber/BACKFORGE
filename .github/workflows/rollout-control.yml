name: Rollout Control

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Rollout command
        required: true
        default: status
        type: choice
        options:
          - status
          - promote
          - abort
          - retry
          - restart
      namespace:
        description: Kubernetes namespace
        required: true
        default: backforge
        type: string

jobs:
  control:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.30.0

      - name: Install kubectl argo-rollouts plugin
        run: |
          curl -sSL -o kubectl-argo-rollouts https://github.com/argoproj/argo-rollouts/releases/download/v1.8.3/kubectl-argo-rollouts-linux-amd64
          chmod +x kubectl-argo-rollouts
          sudo mv kubectl-argo-rollouts /usr/local/bin/kubectl-argo-rollouts

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Run rollout command
        shell: bash
        run: |
          case "${{ inputs.operation }}" in
            status)
              kubectl argo rollouts get rollout backforge-api -n "${{ inputs.namespace }}"
              ;;
            promote)
              kubectl argo rollouts promote backforge-api -n "${{ inputs.namespace }}"
              ;;
            abort)
              kubectl argo rollouts abort backforge-api -n "${{ inputs.namespace }}"
              ;;
            retry)
              kubectl argo rollouts retry rollout backforge-api -n "${{ inputs.namespace }}"
              ;;
            restart)
              kubectl argo rollouts restart backforge-api -n "${{ inputs.namespace }}"
              ;;
          esac
